server:
  port: 9002

spring:
  application:
    name: cof-boot
  profiles:
    default: local
  datasource:
    url: jdbc:postgresql://localhost:5432/cof_db
    username: cof
    password: cof
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    schemas: public
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  type-handlers-package: com.lumoxu.cof.domain.handler
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      table-prefix:

cof:
  resource-root: ${COF_RESOURCE_ROOT:../cof-resource}
